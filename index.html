<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namma Kadai | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #f4f7f6; --dark: #111; --orange: #FF4A00; --card: #fff; --blue: #007BFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--dark); padding: 40px 5vw; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 2px solid #ddd; padding-bottom: 20px;}
        h1 { font-size: 2.5rem; color: var(--orange); }
        .init-btn { background: #111; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s;}
        .init-btn:hover { background: var(--orange); }

        /* 🟢 NEW: PORTALS SECTION 🟢 */
        .portals-section { display: flex; gap: 20px; margin-bottom: 40px; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);}
        .portal-btn { flex: 1; padding: 20px; font-size: 1.2rem; font-weight: 800; color: #fff; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px;}
        .btn-pos { background: linear-gradient(45deg, #111, #333); }
        .btn-pos:hover { background: linear-gradient(45deg, var(--orange), #FF8C00); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,74,0,0.2);}
        .btn-tv { background: linear-gradient(45deg, #007BFF, #0056b3); }
        .btn-tv:hover { background: linear-gradient(45deg, #0056b3, #003d82); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,123,255,0.2);}

        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; align-items: start;}
        .add-item-card { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: sticky; top: 20px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem;}
        .btn-submit { width: 100%; background: var(--orange); color: #fff; padding: 15px; border: none; border-radius: 8px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s;}
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,74,0,0.3); }

        .menu-list-card { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .cat-section { margin-bottom: 40px; }
        .cat-title { font-size: 1.8rem; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; color: var(--dark);}
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px; transition: 0.3s;}
        .item-row:hover { border-color: var(--orange); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .item-info { display: flex; align-items: center; gap: 15px; }
        .item-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover;}
        
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(26px); }
        .status-text { font-weight: 700; font-size: 0.9rem; margin-left: 10px; width: 80px;}
        .status-on { color: #28a745; } .status-off { color: #dc3545; }

        .action-btns { display: flex; gap: 10px; align-items: center;}
        .edit-btn { background: rgba(0, 123, 255, 0.1); color: var(--blue); border: 1px solid var(--blue); padding: 8px 12px; border-radius: 5px; cursor: pointer; transition: 0.3s;}
        .edit-btn:hover { background: var(--blue); color: white; }
        .delete-btn { background: rgba(255, 74, 74, 0.1); color: #ff4a4a; border: 1px solid #ff4a4a; padding: 8px 12px; border-radius: 5px; cursor: pointer; transition: 0.3s;}
        .delete-btn:hover { background: #ff4a4a; color: white; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .edit-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -45%); width: 90%; max-width: 500px; background: #fff; padding: 40px; border-radius: 20px; z-index: 1001; opacity: 0; pointer-events: none; transition: 0.3s; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .edit-modal.active { opacity: 1; transform: translate(-50%, -50%); pointer-events: all; }
        .edit-modal h2 { margin-bottom: 20px; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 10px;}
        .btn-cancel { width: 100%; background: #eee; color: #333; padding: 15px; border: none; border-radius: 8px; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 10px; transition: 0.3s;}
        .btn-cancel:hover { background: #ddd; }
    </style>
</head>
<body>

    <header>
        <h1><i class="fas fa-user-shield"></i> Admin Panel</h1>
        <button class="init-btn" onclick="seedDatabase()"><i class="fas fa-database"></i> Setup Initial Menu</button>
    </header>

    <div class="portals-section">
        <button class="portal-btn btn-pos" onclick="openSecurePortal('pos.html')">
            <i class="fas fa-cash-register"></i> Open Staff POS
        </button>
        <button class="portal-btn btn-tv" onclick="openSecurePortal('tv-screen.html')">
            <i class="fas fa-tv"></i> Open TV Queue Display
        </button>
    </div>

    <div class="dashboard-grid">
        <div class="add-item-card">
            <h2 style="margin-bottom:20px;">Add New Item</h2>
            <div class="form-group">
                <label>Select Category</label>
                <select id="new-cat">
                    <option value="cat-brews">Signature Brews</option>
                    <option value="cat-crunchy">Crunchy Bites</option>
                    <option value="cat-street">Street Delicacies</option>
                    <option value="cat-sweets">Sweet Indulgences</option>
                </select>
            </div>
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" id="new-name" placeholder="E.g. Mint Mojito">
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="new-price" placeholder="E.g. 120">
            </div>
            <div class="form-group">
                <label>Image URL (Optional)</label>
                <input type="text" id="new-img" placeholder="https://unsplash.com/...">
            </div>
            <button class="btn-submit" onclick="addNewItem()">Add Item <i class="fas fa-plus"></i></button>
        </div>

        <div class="menu-list-card" id="admin-menu-list">
            <h2>Loading Live Menu...</h2>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeEditModal()"></div>
    <div class="edit-modal" id="edit-modal">
        <h2>Edit Item</h2>
        <input type="hidden" id="edit-cat-key">
        <input type="hidden" id="edit-item-key">
        
        <div class="form-group">
            <label>Item Name</label>
            <input type="text" id="edit-name">
        </div>
        <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" id="edit-price">
        </div>
        <div class="form-group">
            <label>Image URL</label>
            <input type="text" id="edit-img">
        </div>
        <button class="btn-submit" onclick="saveEdit()"><i class="fas fa-save"></i> Save Changes</button>
        <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
    </div>

    <script>
        // 🔴 SECURITY LOGIC FOR PORTALS 🔴
        const ADMIN_PASSWORD = "admin"; // Change this to your preferred password!

        window.openSecurePortal = function(pageUrl) {
            const userInput = prompt("Enter Admin Password to access this portal:");
            if(userInput === ADMIN_PASSWORD) {
                window.open(pageUrl, '_blank'); // Opens in new tab
            } else if (userInput !== null) {
                alert("Incorrect Password! Access Denied.");
            }
        }

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDyKRrmg_IOwWz3HA5OC5i3B6SuQjRIJzA",
            authDomain: "nammakadai-b34ba.firebaseapp.com",
            databaseURL: "https://nammakadai-b34ba-default-rtdb.firebaseio.com",
            projectId: "nammakadai-b34ba",
            storageBucket: "nammakadai-b34ba.firebasestorage.app",
            messagingSenderId: "489470177133",
            appId: "1:489470177133:web:3af68651e4ec5d6a0a7464"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let globalMenuData = {};

        db.ref('menu').on('value', (snapshot) => {
            const data = snapshot.val();
            globalMenuData = data; 
            if(!data) return document.getElementById('admin-menu-list').innerHTML = "<h2>Database Empty. Click 'Setup Initial Menu' above.</h2>";
            
            let html = '';
            for(let catKey in data) {
                const category = data[catKey];
                html += `<div class="cat-section"><h3 class="cat-title">${category.categoryName}</h3>`;
                if(category.items) {
                    for(let itemKey in category.items) {
                        const item = category.items[itemKey];
                        const isAvailable = item.available !== false;
                        const statusClass = isAvailable ? 'status-on' : 'status-off';
                        const statusText = isAvailable ? 'Available' : 'Out of Stock';
                        
                        html += `
                            <div class="item-row">
                                <div class="item-info">
                                    <img src="${item.img || 'https://picsum.photos/100'}" class="item-img">
                                    <div>
                                        <h4 style="font-size:1.1rem;">${item.name}</h4>
                                        <p style="color: var(--orange); font-weight:800;">₹${item.price}</p>
                                    </div>
                                </div>
                                <div class="action-btns">
                                    <label class="switch">
                                        <input type="checkbox" ${isAvailable ? 'checked' : ''} onchange="toggleAvailability('${catKey}', '${itemKey}', this.checked)">
                                        <span class="slider"></span>
                                    </label>
                                    <span class="status-text ${statusClass}">${statusText}</span>
                                    <button class="edit-btn" onclick="openEditModal('${catKey}', '${itemKey}')" title="Edit Item"><i class="fas fa-edit"></i></button>
                                    <button class="delete-btn" onclick="deleteItem('${catKey}', '${itemKey}')" title="Delete Item"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        `;
                    }
                }
                html += `</div>`;
            }
            document.getElementById('admin-menu-list').innerHTML = html;
        });

        window.toggleAvailability = function(catKey, itemKey, isAvailable) { db.ref(`menu/${catKey}/items/${itemKey}`).update({ available: isAvailable }); }
        window.deleteItem = function(catKey, itemKey) { if(confirm("Delete this item?")) db.ref(`menu/${catKey}/items/${itemKey}`).remove(); }
        
        window.addNewItem = function() {
            const cat = document.getElementById('new-cat').value;
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const img = document.getElementById('new-img').value || `https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=400&q=80`;
            if(!name || !price) return alert("Enter name and price!");
            db.ref(`menu/${cat}/items`).push({ name: name, price: parseInt(price), img: img, available: true }).then(() => {
                alert("Item Added!"); document.getElementById('new-name').value = ''; document.getElementById('new-price').value = ''; document.getElementById('new-img').value = '';
            });
        }

        window.openEditModal = function(catKey, itemKey) {
            const item = globalMenuData[catKey].items[itemKey];
            document.getElementById('edit-cat-key').value = catKey;
            document.getElementById('edit-item-key').value = itemKey;
            document.getElementById('edit-name').value = item.name;
            document.getElementById('edit-price').value = item.price;
            document.getElementById('edit-img').value = item.img;
            document.getElementById('modal-overlay').classList.add('active');
            document.getElementById('edit-modal').classList.add('active');
        }
        window.closeEditModal = function() { document.getElementById('modal-overlay').classList.remove('active'); document.getElementById('edit-modal').classList.remove('active'); }
        
        window.saveEdit = function() {
            const catKey = document.getElementById('edit-cat-key').value;
            const itemKey = document.getElementById('edit-item-key').value;
            const newName = document.getElementById('edit-name').value;
            const newPrice = document.getElementById('edit-price').value;
            const newImg = document.getElementById('edit-img').value;
            if(!newName || !newPrice) return alert("Name and Price cannot be empty!");
            db.ref(`menu/${catKey}/items/${itemKey}`).update({ name: newName, price: parseInt(newPrice), img: newImg }).then(() => { closeEditModal(); }).catch(err => alert("Error: " + err.message));
        }
    </script>
</body>
</html>
