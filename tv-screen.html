<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namma Kadai | Smart Queue Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-deep: #0a0a0a;
            --brand-orange: #FF4A00;
            --prep-yellow: #FFC107;
            --ready-green: #28A745;
            --text-light: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            background-color: var(--bg-deep); 
            background-image: radial-gradient(circle at top right, #1a1a1a, #0a0a0a);
            color: var(--text-light); height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }
        
        /* HEADER */
        header { 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            padding: 20px 5vw; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #222;
        }
        .brand-logo { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; color: var(--brand-orange); }
        .clock { font-size: 2rem; font-weight: 800; color: #fff; }

        /* MAIN LAYOUT */
        .display-container { flex: 1; display: flex; overflow: hidden; }
        .col { flex: 1; padding: 40px 30px; display: flex; flex-direction: column; }
        .col-ready { background: rgba(40,167,69,0.03); border-left: 2px solid #222; }
        
        .col-title { 
            font-family: 'Playfair Display', serif; font-size: 4rem; font-weight: 900; 
            text-align: center; margin-bottom: 30px; padding-bottom: 15px; 
            border-bottom: 3px solid rgba(255,255,255,0.05); text-transform: uppercase;
        }
        .title-prep { color: var(--prep-yellow); }
        .title-ready { color: var(--ready-green); }

        /* Order Cards Styling */
        .order-grid { display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding: 10px; }
        .order-grid::-webkit-scrollbar { display: none; }

        .order-card { 
            width: 100%; background: #161616; border-radius: 20px; padding: 25px; 
            display: flex; align-items: center; gap: 25px; border: 1px solid #333;
            animation: slideIn 0.5s cubic-bezier(0.165, 0.84, 0.44, 1.2) forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
        
        .order-id-box { 
            background: #222; min-width: 120px; height: 120px; border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 2px solid #444;
        }
        .order-id-box .num { font-size: 3.5rem; font-weight: 900; line-height: 1; }
        .order-id-box .tag { font-size: 0.9rem; font-weight: 800; color: #888; text-transform: uppercase;}

        .order-info { flex: 1; }
        .customer-name { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .items-list { font-size: 1.3rem; font-weight: 600; color: #aaa; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* READY STATE UPGRADE */
        .card-ready { 
            background: linear-gradient(135deg, #161616 0%, #0d2b15 100%); 
            border-color: var(--ready-green); box-shadow: 0 0 30px rgba(40,167,69,0.2);
            animation: slideIn 0.5s ease, readyPulse 2s infinite alternate;
        }
        .card-ready .order-id-box { background: var(--ready-green); border-color: #fff; }
        .card-ready .order-id-box .tag { color: rgba(255,255,255,0.7); }
        .card-ready .customer-name { color: #fff; }
        .card-ready .items-list { color: #bfdfc9; }

        @keyframes readyPulse { 0% { box-shadow: 0 0 20px rgba(40,167,69,0.2); } 100% { box-shadow: 0 0 50px rgba(40,167,69,0.5); } }

        /* ALERT OVERLAY */
        .alert-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            background: var(--brand-orange); color: #fff; padding: 40px 80px; border-radius: 30px;
            font-size: 3.5rem; font-weight: 900; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,0.8);
            z-index: 1000; opacity: 0; pointer-events: none; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 8px solid #fff;
        }
        .alert-overlay.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .alert-overlay span { display: block; font-size: 2rem; font-weight: 600; color: rgba(255,255,255,0.8); margin-top: 10px;}

        /* AUDIO STARTER OVERLAY */
        #audio-starter {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.95); z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer; text-align: center; padding: 20px;
        }

        .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 800;
    text-transform: uppercase;
    margin-top: 8px;
    letter-spacing: 1px;
}
.type-dine-in { background: #444; color: #fff; }
.type-takeaway { background: #007bff; color: #fff; } /* Blue for Takeaway */
.type-delivery { background: #6f42c1; color: #fff; } /* Purple for Delivery */
    </style>
</head>
<body>


    <header>
        <div class="brand-logo">NAMMA KADAI</div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <div class="display-container">
        <div class="col">
            <div class="col-title title-prep">Preparing <i class="fas fa-fire-alt"></i></div>
            <div class="order-grid" id="preparing-list"></div>
        </div>
        
        <div class="col col-ready">
            <div class="col-title title-ready">Ready <i class="fas fa-bell"></i></div>
            <div class="order-grid" id="ready-list"></div>
        </div>
    </div>

    <div class="alert-overlay" id="alert-box">
        ORDER #101
        <span id="alert-items">2 ITEMS READY!</span>
    </div>

    <audio id="bell-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        // Clock Logic
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { hour12: true });
        }, 1000);

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDyKRrmg_IOwWz3HA5OC5i3B6SuQjRIJzA",
            authDomain: "nammakadai-b34ba.firebaseapp.com",
            databaseURL: "https://nammakadai-b34ba-default-rtdb.firebaseio.com",
            projectId: "nammakadai-b34ba",
            storageBucket: "nammakadai-b34ba.firebasestorage.app",
            messagingSenderId: "489470177133",
            appId: "1:489470177133:web:3af68651e4ec5d6a0a7464"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let previousReadyState = {};
        let audioEnabled = false;
        const bell = document.getElementById('bell-sound');
        bell.volume = 1.0; // Max Volume

        // 🟢 AUDIO ENABLE LOGIC 🟢
        document.getElementById('audio-starter').addEventListener('click', function() {
            this.style.display = 'none';
            audioEnabled = true;
            // Play and immediately pause to "unlock" audio on browser
            bell.play().then(() => {
                bell.pause();
                bell.currentTime = 0;
            }).catch(e => console.log("Audio unlock failed"));
        });

        db.ref('orders').on('value', (snapshot) => {
            const data = snapshot.val();
            const prepList = document.getElementById('preparing-list');
            const readyList = document.getElementById('ready-list');
            
            prepList.innerHTML = ''; readyList.innerHTML = '';
            if(!data) return;

            for(let key in data) {
                const order = data[key];
                const cardHtml = `
                    <div class="order-card ${order.status === 'ready' ? 'card-ready' : ''}">
                        <div class="order-id-box">
                            <span class="tag">Order</span>
                            <span class="num">${order.orderId}</span>
                        </div>
                        <div class="order-info">
                            <div class="customer-name">${order.customerName || 'Guest User'}</div>
                            <div class="items-list">${order.itemsStr}</div>
                        </div>
                    </div>
                `;

                if(order.status === "preparing") prepList.innerHTML += cardHtml;
                else if (order.status === "ready") {
                    readyList.innerHTML += cardHtml;
                    if(!previousReadyState[key]) {
                        playAlert(order.orderId, order.itemsStr);
                        previousReadyState[key] = true;
                    }
                }
            }
        });

        // 🟢 MULTI-BEEP ALERT LOGIC 🟢
        function playAlert(id, items) {
            if(audioEnabled) {
                // Triple Beep for maximum loudness and attention
                let count = 0;
                const interval = setInterval(() => {
                    bell.currentTime = 0;
                    bell.play();
                    count++;
                    if(count >= 1) clearInterval(interval);
                }, 600); // 0.6s gap between beeps
            }
            
            const alertBox = document.getElementById('alert-box');
            alertBox.innerHTML = `ORDER #${id} <span>${items} is Ready!</span>`;
            alertBox.classList.add('show');
            setTimeout(() => alertBox.classList.remove('show'), 7000);
        }

        // Logic to pick badge class
let badgeClass = "type-dine-in";
if(order.orderType.includes("Takeaway")) badgeClass = "type-takeaway";
if(order.orderType.includes("Delivery")) badgeClass = "type-delivery";

const cardHtml = `
    <div class="order-card ${order.status === 'ready' ? 'card-ready' : ''}">
        <div class="order-id-box">
            <span class="tag">Order</span>
            <span class="num">${order.orderId}</span>
        </div>
        <div class="order-info">
            <div class="customer-name">${order.customerName}</div>
            <div class="items-list">${order.itemsStr}</div>
            <div class="badge ${badgeClass}">${order.orderType || 'Dine-In'}</div>
        </div>
    </div>
`;
    </script>
</body>
</html>
